name: rbx_rewards_app
description: RBX Reward App - UI Only

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  flame: ^1.37.0
  shared_preferences: ^2.5.5
  scratcher: ^2.5.0
  supabase_flutter: ^2.12.4
  connectivity_plus: ^7.1.1
  uuid: ^4.4.0
  flutter_secure_storage: ^10.3.0
  google_mobile_ads: ^5.2.0
  app_tracking_transparency: ^2.0.6
  url_launcher: ^6.3.0
  tapjoy_offerwall: ^14.6.0
  pubscale_offerwall_plugin: ^0.0.4
  flutter_riverpod: ^2.6.1
  hive_flutter: ^1.1.0
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/images/onboarding_screen_main_image.jpeg
    - assets/images/first_feature_card.jpeg
    - assets/images/second_feature_card.jpeg
    - assets/images/thirty_feature_card.jpeg
    - assets/images/mega_chest.png
    - assets/images/robux_coins.png
    - assets/images/tap_tap_mini_game.jpeg
    - assets/images/math_quiz_mini_game.jpeg
    - assets/images/flip_cards_mini_game.PNG
    - assets/images/flappy_mini_game.jpeg
    - assets/images/logo_image.jpeg
    - assets/images/daily_reward_image.png
    - assets/images/games-played.png